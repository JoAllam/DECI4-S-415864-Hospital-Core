name: Hospital CI

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master
permissions:
  contents: write

jobs:
  backend:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:8
        ports:
          - 27017:27017

    env:
      MONGO_URI: mongodb://localhost:27017/hospital

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm test

  appointment-service:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:8
        ports:
          - 27017:27017

    env:
      MONGO_URI: mongodb://localhost:27017/hospital

    defaults:
      run:
        working-directory: microservices/appointment-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm test

  frontend:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npm run build

      - name: Install Lighthouse CI
        working-directory: .
        run: npm install

      - name: Run Lighthouse CI
        working-directory: .
        run: npx lhci autorun
  
  e2e:
    needs:
      - backend
      - appointment-service
      - frontend

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start Docker environment
        run: docker compose up -d

      - name: Wait for services
        run: |
          sleep 20

      - name: Run E2E tests
        run: npx playwright test

      - name: Stop Docker environment
        if: always()
        run: docker compose down
  
  release:
    needs:
      - backend
      - appointment-service
      - frontend

    runs-on: ubuntu-latest

    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}